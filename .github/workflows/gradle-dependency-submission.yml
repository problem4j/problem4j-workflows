name: Dependency Submission

on:
  workflow_call:
    inputs:
      java-version:
        description: "Java version to build with"
        required: false
        type: number
        default: 25

jobs:
  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: "${{ inputs.java-version }}"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-dependency-submission-${{ runner.os }}-java-${{ inputs.java-version }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-dependency-submission-${{ runner.os }}-java-${{ inputs.java-version }}-

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        with:
          cache-disabled: true
          dependency-graph-exclude-configurations: ".*[Tt]est(Compile|Runtime)Classpath"
